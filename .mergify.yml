pull_request_rules:

  - name: Automatic merge
    conditions:
      - "-label=Merge: Manual"
      - "label~=^Type:"
    actions:
      queue:


queue_rules:

  - name: default
    merge_method: squash
    commit_message_template: '{{ title }}'
    queue_conditions:
      - check-success = mergify-ci-status
      - "-draft"
      - "-closed"
      - "-conflict"
      - "label~=^Type:.*"
      - or:
          - "author=fabien-marty"
          - "#approved-reviews-by >= 1"
